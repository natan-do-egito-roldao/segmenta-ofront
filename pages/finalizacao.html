<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processo Concluído</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../style/estilo2.css">
<link rel="icon" href="../images/logo.png">

<style>
html, body{
    margin:0;
}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background: radial-gradient(circle at top left,#0d1247,#191d27 50%);
    font-family: 'Roboto Slab', serif;
    color:#fff;
    padding:60px 20px;
}

.final-wrapper{
    width:100%;
    max-width:650px;
    text-align:center;
    animation: fadeSlide .8s ease;
}

.badge{
    display:inline-block;
    padding:6px 18px;
    border-radius:30px;
    background:rgba(200,169,106,0.15);
    border:1px solid rgba(200,169,106,0.4);
    color:#c8a96a;
    font-size:14px;
    margin-bottom:20px;
    letter-spacing:.5px;
}

.title{
    font-size: clamp(22px,5vw,30px);
    font-weight:600;
    margin-bottom:20px;
}

.text{
    font-size: clamp(14px,4vw,16px);
    opacity:.85;
    line-height:1.6;
    margin-bottom:30px;
}

.card{
    padding:25px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    box-shadow:0 15px 35px rgb(32,33,58);
    margin-bottom:30px;
}

.highlight{
    color:#c8a96a;
    font-weight:600;
}

.btn-final{
    background:linear-gradient(135deg,#c8a96a,#9f7f3f);
    border:none;
    padding:14px 30px;
    border-radius:40px;
    font-weight:600;
    color:#111;
    transition:.3s;
    width:100%;
}

.btn-final:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(200,169,106,.4);
}
</style>
</head>

<body>

<div class="final-wrapper">

    <div class="badge">
        Processo Finalizado
    </div>

    <div class="title">
        ✅ Dados enviados com sucesso!
    </div>

    <div class="text">
        Seu cadastro como <span class="highlight">Cliente Modelo</span> foi concluído.
        <br><br>
        Agora seguimos para a etapa estratégica do seu projeto.
    </div>

    <div class="card">

        <p style="opacity:.85; color: #fff;">
            Em breve você receberá nossa mensagem para organizar os próximos passos.
        </p>

        <p style="font-size:14px; opacity:.6; color: #fff;">
            Recomendamos manter o WhatsApp disponível.
        </p>

    </div>

</div>
</body>
</html>
